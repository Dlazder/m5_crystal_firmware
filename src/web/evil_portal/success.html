<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Google Sans", Roboto, Arial, sans-serif;
      background: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
    }
    .logo {
      margin-bottom: 32px;
      font-size: 28px;
      font-weight: 500;
      letter-spacing: -0.5px;
    }
    .logo .blue   { color: #4285F4; }
    .logo .red    { color: #EA4335; }
    .logo .yellow { color: #FBBC05; }
    .logo .green  { color: #34A853; }
    .card {
      border: 1px solid #dadce0;
      border-radius: 8px;
      padding: 48px 40px 36px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .spinner {
      width: 32px; height: 32px;
      margin: 0 auto 24px;
      border: 3px solid #dadce0;
      border-top-color: #1a73e8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 16px; font-weight: 400; color: #202124; }
    .subtitle { font-size: 14px; color: #5f6368; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="logo">
    <span class="blue">G</span><span class="red">o</span><span class="yellow">o</span><span class="green">g</span><span class="blue">l</span><span class="red">e</span>
  </div>
  <div class="card">
    <div class="spinner"></div>
    <h1>Verifying...</h1>
    <p class="subtitle">You may now close this page</p>
  </div>
</body>
</html>
