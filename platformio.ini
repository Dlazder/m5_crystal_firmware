[env:m5stick-c-plus2]
platform = platformio/espressif32
board = m5stickc_plus2
framework = arduino
board_build.filesystem = littlefs
monitor_speed = 115200
upload_speed = 1500000
build_unflags =
	-std=gnu++11
build_flags =
	-Iinclude
	-Isystem
	-Wl,-zmuldefs
	-std=gnu++17
	-finput-charset=UTF-8
	-fexec-charset=UTF-8
	-mtext-section-literals
	-Os

lib_deps =
	m5stack/M5Unified
	m5stack/M5GFX
	adafruit/Adafruit PN532@^1.1.0
	https://github.com/blackketter/ESP32-BLE-Combo.git
	dfrobot/DFRobot_GP8XXX @ 1.0.1
	olikraus/U8g2@^2.35.30
	arduino-libraries/NTPClient@^3.2.1
upload_port = COM3

[env:cardputer-adv]
platform = espressif32@6.7.0
board = esp32-s3-devkitc-1
framework = arduino
board_build.filesystem = littlefs
monitor_speed = 115200
upload_speed = 1500000
build_unflags =
	-std=gnu++11
build_flags =
	-Iinclude
	-Isystem
	-Wl,-zmuldefs
	-std=gnu++17
	-finput-charset=UTF-8
	-fexec-charset=UTF-8
	-mtext-section-literals
	-Os
	-DESP32S3
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DARDUINO_USB_MODE=1
	-DCARDPUTER
lib_deps =
	m5stack/M5Unified
	m5stack/M5GFX
	M5Cardputer=https://github.com/m5stack/M5Cardputer
	adafruit/Adafruit PN532@^1.1.0
	https://github.com/blackketter/ESP32-BLE-Combo.git
	dfrobot/DFRobot_GP8XXX @ 1.0.1
	olikraus/U8g2@^2.35.30
	arduino-libraries/NTPClient@^3.2.1
upload_port = COM4


; The project needs to be adapted for emulation
[env:native]
platform = native
build_type = debug
build_flags = 
	-O0 -std=c++14
	-I/ucrt64/include/SDL2
	-L/ucrt64/lib
	-lmingw32 -lSDL2main -lSDL2
	-mwindows
	-DM5GFX_SHOW_FRAME
	-DM5GFX_BOARD=board_M5StickCPlus
	-DM5GFX_SCALE=2
	-DEMULATION=1
lib_deps = 
	m5stack/M5Unified
	m5stack/M5GFX
lib_ignore = 
	WiFi